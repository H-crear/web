name: 部署到 GitHub Pages

on:
  push:
    branches:
      - main
      - feat/ai-portfolio-refresh
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Pages
        uses: actions/configure-pages@v4

      - name: 上传 artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: 部署到 GitHub Pages
        uses: actions/deploy-pages@v4
