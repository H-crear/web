<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">霓虹植物志</title>
  <desc id="desc">霓虹色植物枝叶以标本图谱方式排列在深色背景上。</desc>
  <defs>
