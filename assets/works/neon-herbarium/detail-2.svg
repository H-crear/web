  </defs>
  <rect width="1200" height="760" fill="url(#sky)"/>
  <rect width="1200" height="760" fill="url(#grid)" opacity=".65"/>
  <circle cx="256" cy="168" r="122" fill="#c8ff4a" opacity=".16" filter="url(#soft)"/>
  <circle cx="884" cy="218" r="132" fill="#7df5e8" opacity=".14" filter="url(#soft)"/>
  <path d="M0 206 C 160 126, 250 326, 420 216 S 720 136, 900 226 S 1090 326, 1200 246 V760 H0Z" fill="#10271f" opacity=".72"/>
  <path d="M0 381 C 130 301, 280 416, 430 326 S 720 276, 860 356 S 1070 456, 1200 366 V760 H0Z" fill="#101014" opacity=".78"/>
  <g fill="none" stroke="#c8ff4a" stroke-width="3" stroke-linecap="round" opacity=".82">
    <path d="M170 462 C280 354, 370 598, 510 430 S720 403, 840 460 S990 572, 1080 448"/>
    <path d="M120 398 L320 332 L520 312 L710 298 L960 310"/>
