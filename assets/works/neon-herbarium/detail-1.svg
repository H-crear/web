      <stop offset="0" stop-color="#101014"/>
      <stop offset="0.56" stop-color="#10271f"/>
      <stop offset="1" stop-color="#ff5ea8"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#7df5e8" stroke-opacity=".12" stroke-width="1"/>
    </pattern>
    <filter id="soft">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#sky)"/>
  <rect width="1200" height="760" fill="url(#grid)" opacity=".65"/>
  <circle cx="256" cy="148" r="122" fill="#c8ff4a" opacity=".16" filter="url(#soft)"/>
  <circle cx="884" cy="198" r="132" fill="#7df5e8" opacity=".14" filter="url(#soft)"/>
  <path d="M0 186 C 160 106, 250 306, 420 196 S 720 116, 900 206 S 1090 306, 1200 226 V760 H0Z" fill="#10271f" opacity=".72"/>
  <path d="M0 361 C 130 281, 280 396, 430 306 S 720 256, 860 336 S 1070 436, 1200 346 V760 H0Z" fill="#101014" opacity=".78"/>
  <g fill="none" stroke="#7df5e8" stroke-width="3" stroke-linecap="round" opacity=".82">
    <path d="M170 482 C280 354, 370 578, 510 430 S720 383, 840 460 S990 592, 1080 448"/>
    <path d="M120 378 L320 332 L520 332 L710 278 L960 310"/>
    <path d="M230 592 L410 530 L600 608 L790 510 L1010 536"/>
