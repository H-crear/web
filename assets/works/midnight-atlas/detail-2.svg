<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">午夜地图集</title>
  <desc id="desc">深蓝夜色中的抽象城市地图，街区像星座一样发光。</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.56" stop-color="#12213a"/>
      <stop offset="1" stop-color="#f4b24a"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#d9e8ff" stroke-opacity=".12" stroke-width="1"/>
    </pattern>
    <filter id="soft">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#sky)"/>
  <rect width="1200" height="760" fill="url(#grid)" opacity=".65"/>
  <circle cx="199" cy="168" r="113" fill="#21d0b3" opacity=".16" filter="url(#soft)"/>
  <circle cx="926" cy="218" r="138" fill="#d9e8ff" opacity=".14" filter="url(#soft)"/>
  <path d="M0 170 C 160 90, 250 290, 420 180 S 720 100, 900 190 S 1090 290, 1200 210 V760 H0Z" fill="#12213a" opacity=".72"/>
  <path d="M0 345 C 130 265, 280 380, 430 290 S 720 240, 860 320 S 1070 420, 1200 330 V760 H0Z" fill="#08111f" opacity=".78"/>
  <g fill="none" stroke="#21d0b3" stroke-width="3" stroke-linecap="round" opacity=".82">
    <path d="M170 462 C280 381, 370 598, 510 430 S720 403, 840 490 S990 572, 1080 427"/>
    <path d="M120 398 L320 308 L520 312 L710 298 L960 310"/>
    <path d="M230 572 L410 530 L600 628 L790 510 L1010 554"/>
  </g>
  <g fill="#f4b24a" stroke="#d9e8ff" stroke-opacity=".8" stroke-width="2">
    <circle cx="170" cy="462" r="10"/>
    <circle cx="320" cy="308" r="8"/>
    <circle cx="510" cy="430" r="12"/>
    <circle cx="710" cy="298" r="9"/>
    <circle cx="840" cy="490" r="11"/>
    <circle cx="1010" cy="554" r="8"/>
  </g>
  <g opacity=".9">
    <rect x="76" y="74" width="320" height="88" rx="6" fill="#08111f" fill-opacity=".72" stroke="#d9e8ff" stroke-opacity=".22"/>
    <text x="100" y="116" fill="#d9e8ff" font-family="Arial, sans-serif" font-size="22" letter-spacing="2">午夜地图集</text>
    <text x="100" y="146" fill="#21d0b3" font-family="Arial, sans-serif" font-size="18">概念世界观</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="14" fill="#d9e8ff" opacity=".78">
    <text x="940" y="650">ARCHIVE 01</text>
    <text x="940" y="678">2026 / 概念世界观</text>
  </g>
</svg>
