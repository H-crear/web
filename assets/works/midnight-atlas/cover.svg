<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Midnight Atlas</title>
  <desc id="desc">深蓝夜色中的抽象城市地图，街区像星座一样发光。</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.56" stop-color="#12213a"/>
      <stop offset="1" stop-color="#f4b24a"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#d9e8ff" stroke-opacity=".12" stroke-width="1"/>
    </pattern>
    <filter id="soft">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#sky)"/>
  <rect width="1200" height="760" fill="url(#grid)" opacity=".65"/>
  <circle cx="199" cy="130" r="113" fill="#21d0b3" opacity=".16" filter="url(#soft)"/>
  <circle cx="926" cy="180" r="138" fill="#d9e8ff" opacity=".14" filter="url(#soft)"/>
  <path d="M0 132 C 160 52, 250 252, 420 142 S 720 62, 900 152 S 1090 252, 1200 172 V760 H0Z" fill="#12213a" opacity=".72"/>
  <path d="M0 307 C 130 227, 280 342, 430 252 S 720 202, 860 282 S 1070 382, 1200 292 V760 H0Z" fill="#08111f" opacity=".78"/>
  <g fill="none" stroke="#21d0b3" stroke-width="3" stroke-linecap="round" opacity=".82">
    <path d="M170 500 C280 381, 370 560, 510 430 S720 365, 840 490 S990 610, 1080 427"/>
    <path d="M120 360 L320 308 L520 350 L710 260 L960 310"/>
    <path d="M230 610 L410 530 L600 590 L790 510 L1010 554"/>
  </g>
  <g fill="#21d0b3" stroke="#d9e8ff" stroke-opacity=".8" stroke-width="2">
    <circle cx="170" cy="500" r="10"/>
    <circle cx="320" cy="308" r="8"/>
    <circle cx="510" cy="430" r="12"/>
    <circle cx="710" cy="260" r="9"/>
    <circle cx="840" cy="490" r="11"/>
    <circle cx="1010" cy="554" r="8"/>
  </g>
  <g opacity=".9">
    <rect x="76" y="74" width="320" height="88" rx="6" fill="#08111f" fill-opacity=".72" stroke="#d9e8ff" stroke-opacity=".22"/>
    <text x="100" y="116" fill="#d9e8ff" font-family="Arial, sans-serif" font-size="22" letter-spacing="2">Midnight Atlas</text>
    <text x="100" y="146" fill="#21d0b3" font-family="Arial, sans-serif" font-size="18">午夜地图集</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="14" fill="#d9e8ff" opacity=".78">
    <text x="940" y="650">ARCHIVE 01</text>
    <text x="940" y="678">2026 / 概念世界观</text>
  </g>
</svg>
