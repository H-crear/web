  </g>
  <rect x="76" y="72" width="385" height="112" rx="8" fill="#08111f" fill-opacity=".72" stroke="#d9e8ff" stroke-opacity=".22"/>
  <text x="104" y="118" fill="#d9e8ff" font-family="Arial, sans-serif" font-size="24">午夜地图集</text>
  <text x="104" y="154" fill="#21d0b3" font-family="Arial, sans-serif" font-size="18">电影感夜景</text>
  <text x="930" y="650" fill="#d9e8ff" opacity=".78" font-family="Arial, sans-serif" font-size="16">raster PNG / 概念城市</text>
