<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">午夜地图集</title>
  <desc id="desc">午夜地图集 的轻量详情图，展示 电影感夜景 风格线索。</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#08111f"/><stop offset=".55" stop-color="#12213a"/><stop offset="1" stop-color="#f4b24a"/></linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse"><path d="M44 0H0V44" fill="none" stroke="#d9e8ff" stroke-opacity=".11"/></pattern>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect width="1200" height="760" fill="url(#g)"/>
  <rect width="1200" height="760" fill="url(#grid)"/>
  <circle cx="183" cy="145" r="150" fill="#21d0b3" opacity=".14" filter="url(#blur)"/>
  <circle cx="923" cy="170" r="170" fill="#d9e8ff" opacity=".12" filter="url(#blur)"/>
  <path d="M0 231 C170 130, 310 350, 520 260 S820 144, 1200 290 V760 H0Z" fill="#12213a" opacity=".7"/>
  <path d="M0 510 C220 428, 360 640, 570 510 S820 390, 1200 560 V760 H0Z" fill="#08111f" opacity=".78"/>
  <g fill="none" stroke="#21d0b3" stroke-width="4" stroke-linecap="round" opacity=".85">
    <path d="M100 510 C260 440, 340 600, 510 480 S760 360, 940 500 S1040 630, 1120 430"/>
    <path d="M170 360 L340 295 L520 370 L730 270 L1010 346"/>
  </g>
  <g fill="#f4b24a" stroke="#d9e8ff" stroke-opacity=".7" stroke-width="2">
