<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Desert Signal Library</title>
  <desc id="desc">橙色沙丘中的黑色图书馆塔发出绿色无线电信号。</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c1510"/>
      <stop offset="0.56" stop-color="#9a6032"/>
      <stop offset="1" stop-color="#53e089"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#171b18" stroke-opacity=".12" stroke-width="1"/>
    </pattern>
    <filter id="soft">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#sky)"/>
  <rect width="1200" height="760" fill="url(#grid)" opacity=".65"/>
  <circle cx="332" cy="130" r="134" fill="#f2c06a" opacity=".16" filter="url(#soft)"/>
  <circle cx="828" cy="180" r="124" fill="#171b18" opacity=".14" filter="url(#soft)"/>
  <path d="M0 216 C 160 136, 250 336, 420 226 S 720 146, 900 236 S 1090 336, 1200 256 V760 H0Z" fill="#9a6032" opacity=".72"/>
  <path d="M0 391 C 130 311, 280 426, 430 336 S 720 286, 860 366 S 1070 466, 1200 376 V760 H0Z" fill="#1c1510" opacity=".78"/>
  <g fill="none" stroke="#f2c06a" stroke-width="3" stroke-linecap="round" opacity=".82">
    <path d="M170 500 C280 318, 370 560, 510 430 S720 365, 840 420 S990 610, 1080 476"/>
    <path d="M120 360 L320 364 L520 350 L710 260 L960 310"/>
    <path d="M230 610 L410 530 L600 590 L790 510 L1010 512"/>
  </g>
  <g fill="#f2c06a" stroke="#171b18" stroke-opacity=".8" stroke-width="2">
    <circle cx="170" cy="500" r="10"/>
    <circle cx="320" cy="364" r="8"/>
    <circle cx="510" cy="430" r="12"/>
    <circle cx="710" cy="260" r="9"/>
    <circle cx="840" cy="420" r="11"/>
    <circle cx="1010" cy="512" r="8"/>
