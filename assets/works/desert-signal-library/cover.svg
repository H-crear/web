    <text x="100" y="116" fill="#171b18" font-family="Arial, sans-serif" font-size="22" letter-spacing="2">Desert Signal Library</text>
    <text x="100" y="146" fill="#f2c06a" font-family="Arial, sans-serif" font-size="18">沙丘信号图书馆</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="14" fill="#171b18" opacity=".78">
