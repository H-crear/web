<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">拼贴梦境引擎</title>
  <desc id="desc">拼贴梦境引擎 的轻量详情图，展示 实验拼贴 风格线索。</desc>
  <defs>
