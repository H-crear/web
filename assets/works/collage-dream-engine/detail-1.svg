    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse"><path d="M44 0H0V44" fill="none" stroke="#80ff72" stroke-opacity=".11"/></pattern>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect width="1200" height="760" fill="url(#g)"/>
  <rect width="1200" height="760" fill="url(#grid)"/>
  <circle cx="413" cy="145" r="150" fill="#e4572e" opacity=".14" filter="url(#blur)"/>
  <circle cx="753" cy="170" r="170" fill="#80ff72" opacity=".12" filter="url(#blur)"/>
  <path d="M0 341 C170 130, 310 350, 520 260 S820 284, 1200 290 V760 H0Z" fill="#f0e1c2" opacity=".7"/>
  <path d="M0 510 C220 508, 360 640, 570 510 S820 390, 1200 560 V760 H0Z" fill="#13110f" opacity=".78"/>
  <g fill="none" stroke="#e4572e" stroke-width="4" stroke-linecap="round" opacity=".85">
    <path d="M100 510 C260 440, 340 600, 510 480 S760 360, 940 500 S1040 630, 1120 430"/>
    <path d="M170 360 L340 245 L520 370 L730 270 L1010 406"/>
  </g>
