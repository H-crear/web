  </g>
  <rect x="76" y="72" width="385" height="112" rx="8" fill="#13110f" fill-opacity=".72" stroke="#80ff72" stroke-opacity=".22"/>
  <text x="104" y="118" fill="#80ff72" font-family="Arial, sans-serif" font-size="24">拼贴梦境引擎</text>
  <text x="104" y="154" fill="#e4572e" font-family="Arial, sans-serif" font-size="18">实验拼贴</text>
  <text x="930" y="650" fill="#80ff72" opacity=".78" font-family="Arial, sans-serif" font-size="16">raster PNG / 抽象海报</text>
