  <path d="M0 218 C 160 138, 250 338, 420 228 S 720 148, 900 238 S 1090 338, 1200 258 V760 H0Z" fill="#2d3148" opacity=".72"/>
  <path d="M0 393 C 130 313, 280 428, 430 338 S 720 288, 860 368 S 1070 468, 1200 378 V760 H0Z" fill="#0f1020" opacity=".78"/>
  <g fill="none" stroke="#ffc36b" stroke-width="3" stroke-linecap="round" opacity=".82">
