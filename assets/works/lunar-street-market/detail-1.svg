  <circle cx="275" cy="148" r="125" fill="#ffc36b" opacity=".16" filter="url(#soft)"/>
  <circle cx="870" cy="198" r="130" fill="#b9d9ff" opacity=".14" filter="url(#soft)"/>
  <path d="M0 198 C 160 118, 250 318, 420 208 S 720 128, 900 218 S 1090 318, 1200 238 V760 H0Z" fill="#2d3148" opacity=".72"/>
  <path d="M0 373 C 130 293, 280 408, 430 318 S 720 268, 860 348 S 1070 448, 1200 358 V760 H0Z" fill="#0f1020" opacity=".78"/>
  <g fill="none" stroke="#b9d9ff" stroke-width="3" stroke-linecap="round" opacity=".82">
