      <stop offset="0.56" stop-color="#2d3148"/>
      <stop offset="1" stop-color="#df5b45"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#b9d9ff" stroke-opacity=".12" stroke-width="1"/>
    </pattern>
    <filter id="soft">
      <feGaussianBlur stdDeviation="16"/>
