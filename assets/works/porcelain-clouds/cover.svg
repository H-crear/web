  <g fill="#6f99a0" stroke="#2d4a52" stroke-opacity=".8" stroke-width="2">
    <circle cx="170" cy="500" r="10"/>
    <circle cx="320" cy="316" r="8"/>
    <circle cx="510" cy="430" r="12"/>
    <circle cx="710" cy="260" r="9"/>
    <circle cx="840" cy="480" r="11"/>
    <circle cx="1010" cy="548" r="8"/>
