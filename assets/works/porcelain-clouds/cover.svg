<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Porcelain Clouds</title>
  <desc id="desc">乳白和青色云朵漂浮在瓷器釉面般的抽象空间中。</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5f1e8"/>
      <stop offset="0.56" stop-color="#c9e2df"/>
      <stop offset="1" stop-color="#d79c6b"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#2d4a52" stroke-opacity=".12" stroke-width="1"/>
    </pattern>
    <filter id="soft">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#sky)"/>
  <rect width="1200" height="760" fill="url(#grid)" opacity=".65"/>
  <circle cx="218" cy="130" r="116" fill="#6f99a0" opacity=".16" filter="url(#soft)"/>
  <circle cx="912" cy="180" r="136" fill="#2d4a52" opacity=".14" filter="url(#soft)"/>
  <path d="M0 144 C 160 64, 250 264, 420 154 S 720 74, 900 164 S 1090 264, 1200 184 V760 H0Z" fill="#c9e2df" opacity=".72"/>
  <path d="M0 319 C 130 239, 280 354, 430 264 S 720 214, 860 294 S 1070 394, 1200 304 V760 H0Z" fill="#f5f1e8" opacity=".78"/>
  <g fill="none" stroke="#6f99a0" stroke-width="3" stroke-linecap="round" opacity=".82">
    <path d="M170 500 C280 372, 370 560, 510 430 S720 365, 840 480 S990 610, 1080 434"/>
    <path d="M120 360 L320 316 L520 350 L710 260 L960 310"/>
    <path d="M230 610 L410 530 L600 590 L790 510 L1010 548"/>
