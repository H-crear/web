    <text x="100" y="116" fill="#2d4a52" font-family="Arial, sans-serif" font-size="22" letter-spacing="2">Porcelain Clouds</text>
    <text x="100" y="146" fill="#6f99a0" font-family="Arial, sans-serif" font-size="18">瓷云档案</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="14" fill="#2d4a52" opacity=".78">
