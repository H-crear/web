  <path d="M0 337 C 130 257, 280 372, 430 282 S 720 232, 860 312 S 1070 412, 1200 322 V760 H0Z" fill="#f5f1e8" opacity=".78"/>
  <g fill="none" stroke="#2d4a52" stroke-width="3" stroke-linecap="round" opacity=".82">
