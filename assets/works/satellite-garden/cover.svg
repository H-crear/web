<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Satellite Garden</title>
  <desc id="desc">轨道卫星上漂浮着温室花园和圆形天线结构。</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1420"/>
      <stop offset="0.56" stop-color="#20352c"/>
      <stop offset="1" stop-color="#cdd8e2"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#f2b65c" stroke-opacity=".12" stroke-width="1"/>
    </pattern>
    <filter id="soft">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#sky)"/>
  <rect width="1200" height="760" fill="url(#grid)" opacity=".65"/>
  <circle cx="313" cy="130" r="131" fill="#94c76e" opacity=".16" filter="url(#soft)"/>
  <circle cx="842" cy="180" r="126" fill="#f2b65c" opacity=".14" filter="url(#soft)"/>
  <path d="M0 204 C 160 124, 250 324, 420 214 S 720 134, 900 224 S 1090 324, 1200 244 V760 H0Z" fill="#20352c" opacity=".72"/>
  <path d="M0 379 C 130 299, 280 414, 430 324 S 720 274, 860 354 S 1070 454, 1200 364 V760 H0Z" fill="#0d1420" opacity=".78"/>
  <g fill="none" stroke="#94c76e" stroke-width="3" stroke-linecap="round" opacity=".82">
    <path d="M170 500 C280 327, 370 560, 510 430 S720 365, 840 430 S990 610, 1080 469"/>
    <path d="M120 360 L320 356 L520 350 L710 260 L960 310"/>
    <path d="M230 610 L410 530 L600 590 L790 510 L1010 518"/>
  </g>
  <g fill="#94c76e" stroke="#f2b65c" stroke-opacity=".8" stroke-width="2">
    <circle cx="170" cy="500" r="10"/>
    <circle cx="320" cy="356" r="8"/>
    <circle cx="510" cy="430" r="12"/>
    <circle cx="710" cy="260" r="9"/>
    <circle cx="840" cy="430" r="11"/>
    <circle cx="1010" cy="518" r="8"/>
