    <text x="100" y="116" fill="#f2b65c" font-family="Arial, sans-serif" font-size="22" letter-spacing="2">Satellite Garden</text>
    <text x="100" y="146" fill="#94c76e" font-family="Arial, sans-serif" font-size="18">卫星花园</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="14" fill="#f2b65c" opacity=".78">
