<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Satellite Garden</title>
  <desc id="desc">卫星花园 的轻量详情图，展示 可持续未来 风格线索。</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0d1420"/><stop offset=".55" stop-color="#20352c"/><stop offset="1" stop-color="#cdd8e2"/></linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse"><path d="M44 0H0V44" fill="none" stroke="#f2b65c" stroke-opacity=".11"/></pattern>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect width="1200" height="760" fill="url(#g)"/>
  <rect width="1200" height="760" fill="url(#grid)"/>
  <circle cx="390" cy="171" r="150" fill="#94c76e" opacity=".14" filter="url(#blur)"/>
  <circle cx="770" cy="196" r="170" fill="#f2b65c" opacity=".12" filter="url(#blur)"/>
  <path d="M0 330 C170 156, 310 324, 520 286 S820 270, 1200 316 V760 H0Z" fill="#20352c" opacity=".7"/>
  <path d="M0 484 C220 500, 360 614, 570 510 S820 390, 1200 560 V760 H0Z" fill="#0d1420" opacity=".78"/>
  <g fill="none" stroke="#94c76e" stroke-width="4" stroke-linecap="round" opacity=".85">
    <path d="M100 484 C260 440, 340 600, 510 480 S760 360, 940 500 S1040 630, 1120 430"/>
    <path d="M170 386 L340 250 L520 396 L730 270 L1010 400"/>
  </g>
  <g fill="#cdd8e2" stroke="#f2b65c" stroke-opacity=".7" stroke-width="2">
    <circle cx="180" cy="386" r="10"/><circle cx="340" cy="250" r="8"/><circle cx="520" cy="396" r="12"/><circle cx="730" cy="270" r="9"/><circle cx="1010" cy="400" r="10"/>
  </g>
  <rect x="76" y="72" width="385" height="112" rx="8" fill="#0d1420" fill-opacity=".72" stroke="#f2b65c" stroke-opacity=".22"/>
  <text x="104" y="118" fill="#f2b65c" font-family="Arial, sans-serif" font-size="24">Satellite Garden</text>
  <text x="104" y="154" fill="#94c76e" font-family="Arial, sans-serif" font-size="18">系统景观</text>
  <text x="930" y="650" fill="#f2b65c" opacity=".78" font-family="Arial, sans-serif" font-size="16">raster PNG / 系统景观</text>
